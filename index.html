<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibiza 2026 Countdown</title>
    <style>
        /* Estilos generales minimalistas y oscuros */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a; /* Azul muy oscuro */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* Estilos para la imagen */
        .header-image {
            width: 100%;
            max-width: 400px; /* Ajusta el tamaño máximo de la imagen */
            height: auto;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Título en inglés */
        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #38bdf8; /* Azul claro brillante */
        }

        /* Contenedor del contador */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Para que se adapte a móviles */
        }

        /* Cajas de tiempo */
        .time-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex: 1 1 100px; /* Ajuste responsivo */
        }

        .number {
            display: block;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
        }

        /* Etiquetas en inglés */
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #94a3b8; /* Gris azulado */
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/400x200?text=IBIZA+IMAGE" alt="Ibiza" class="header-image" id="page-image">

        <h1 id="title">TIME REMAINING FOR IBIZA 2026</h1>

        <div id="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Fecha objetivo (20 de Junio de 2026)
        const countdownDate = new Date("Jun 20, 2026 00:00:00").getTime();

        // Actualizar cada segundo
        const x = setInterval(function() {
            // Fecha y hora actual
            const now = new Date().getTime();

            // Distancia entre ahora y la fecha objetivo
            const distance = countdownDate - now;

            // Cálculos de tiempo
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Mostrar resultados en los elementos correspondientes
            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;

            // Si la cuenta regresiva termina
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("title").innerText = "IT'S IBIZA TIME!";
                document.getElementById("countdown").style.display = "none";
            }
        }, 1000);
    </script>
</body>
</html>
