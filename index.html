<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibiza 2026 🌴</title>
    <style>
        /* OPCIONES DE FUENTE:
           Para cambiar el estilo, cambia 'system-ui' por:
           - 'Courier New' (Estilo retro/digital)
           - 'Trebuchet MS' (Divertida y clara)
           - 'Impact' (Fuerte y festiva)
        */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0c; /* Fondo oscuro tipo noche */
            color: #ff4d94; /* Rosa Vibrante */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .header-image {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.3); /* Brillo rosa suave */
            border: 2px solid #ff4d94;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(255, 77, 148, 0.5);
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(255, 77, 148, 0.1); /* Fondo rosa transparente */
            padding: 20px;
            border-radius: 15px;
            min-width: 90px;
            border: 1px solid rgba(255, 77, 148, 0.3);
            flex: 1 1 100px;
        }

        .number {
            display: block;
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #ff80b3; /* Rosa más clarito para las letras pequeñas */
            font-weight: bold;
            letter-spacing: 1px;
        }

        .emoji-span {
            font-size: 1.5rem;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/400x200?text=IBIZA+2026" alt="Ibiza" class="header-image">

        <h1>✈️ TIME REMAINING FOR IBIZA 2026 🌴</h1>

        <div id="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
                <span class="emoji-span">🥂</span>
            </div>
        </div>
    </div>

    <script>
        const countdownDate = new Date("Jun 20, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("title").innerText = "PARTY TIME! 🥳";
                document.getElementById("countdown").style.display = "none";
            }
        }, 1000);
    </script>
</body>
</html>
